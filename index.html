<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abinash | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #f1f5f9;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: #111827;
            position: sticky;
            top: 0;
        }

        nav h2 {
            color: #38bdf8;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #f1f5f9;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #38bdf8;
        }

        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: 3rem;
            color: #38bdf8;
        }

        .hero p {
            margin-top: 15px;
            font-size: 1.2rem;
            max-width: 600px;
        }

        section {
            padding: 80px 10%;
        }

        h2.section-title {
            margin-bottom: 30px;
            color: #38bdf8;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #111827;
            margin-top: 50px;
        }

        @media(max-width:768px){
            .hero h1{
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<nav>
    <h2>Abinash</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Hello, I'm Abinash</h1>
    <p>Engineering Student | Developer | Building cool tech projects.</p>
</div>

<section id="about">
    <h2 class="section-title">About Me</h2>
    <p>Write about yourself here.</p>
</section>

<section id="skills">
    <h2 class="section-title">Skills</h2>
</section>

<section id="projects">
    <h2 class="section-title">Projects</h2>
</section>

<section id="contact">
    <h2 class="section-title">Contact</h2>
</section>

<footer>
    © 2026 Abinash. All Rights Reserved.
</footer>

</body>
</html>
